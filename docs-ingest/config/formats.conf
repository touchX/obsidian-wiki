# formats.conf — 多格式文档摄取配置文件
# 用途：集中管理支持的格式、MIME 映射、转换配置和技能路径

# ============================================================================
# 支持的格式列表
# ============================================================================
# 格式| MIME 类型
SUPPORTED_FORMATS=(
    "pdf|application/pdf"
    "docx|application/vnd.openxmlformats-officedocument.wordprocessingml.document"
    "xlsx|application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
    "pptx|application/vnd.openxmlformats-officedocument.presentationml.presentation"
    "markdown|text/markdown"
    "html|text/html"
    "text|text/plain"
)

# ============================================================================
# MIME 类型映射关联数组
# ============================================================================
declare -A MIME_TO_EXT=(
    ["application/pdf"]="pdf"
    ["application/vnd.openxmlformats-officedocument.wordprocessingml.document"]="docx"
    ["application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"]="xlsx"
    ["application/vnd.openxmlformats-officedocument.presentationml.presentation"]="pptx"
    ["text/markdown"]="md"
    ["text/html"]="html"
    ["text/plain"]="txt"
)

# ============================================================================
# 旧格式转换配置
# ============================================================================
# 是否启用旧格式转换（.doc → .docx, .xls → .xlsx）
LEGACY_FORMAT_CONVERSION=true

# LibreOffice 可执行文件路径
LIBREOFFICE_PATH="soffice"

# 转换超时时间（秒）
CONVERSION_TIMEOUT=60

# 旧格式 MIME 映射（预转换目标格式）
declare -A LEGACY_MIME_MAP=(
    ["application/msword"]="docx"
    ["application/vnd.ms-excel"]="xlsx"
    ["application/vnd.ms-powerpoint"]="pptx"
    ["application/vnd.oasis.opendocument.text"]="docx"
    ["application/vnd.oasis.opendocument.spreadsheet"]="xlsx"
    ["application/vnd.oasis.opendocument.presentation"]="pptx"
)

# ============================================================================
# Skill 路径配置
# ============================================================================
# 技能基础目录
SKILL_BASE_DIR=".claude/skills"

# 各格式对应的 Skill 路径
DOCX_SKILL="${SKILL_BASE_DIR}/docx"
XLSX_SKILL="${SKILL_BASE_DIR}/xlsx"
PDF_SKILL="${SKILL_BASE_DIR}/pdf"
MARKDOWN_SKILL="${SKILL_BASE_DIR}/markdown"
HTML_SKILL="${SKILL_BASE_DIR}/html"

# ============================================================================
# 错误处理配置
# ============================================================================
# 最大重试次数
MAX_RETRY_ATTEMPTS=3

# 重试延迟基数（秒），使用指数退避策略
RETRY_DELAY_BASE=2

# ============================================================================
# 日志配置
# ============================================================================
# 日志文件路径（相对于项目根目录）
LOG_FILE="wiki/ingest.log"

# 日志级别：DEBUG, INFO, WARN, ERROR
LOG_LEVEL="INFO"

# 日志文件最大大小（MB），超过后轮转
LOG_MAX_SIZE=10

# 保留的日志文件数量
LOG_BACKUP_COUNT=5

# ============================================================================
# 临时文件配置
# ============================================================================
# 临时文件目录
TEMP_DIR=".tmp/ingest"

# 转换后的文件保留（用于调试）
KEEP_TEMP_FILES=false

# ============================================================================
# 性能配置
# ============================================================================
# 并发处理的最大文件数
MAX_CONCURRENT_FILES=5

# 单个文件处理超时（秒）
FILE_PROCESSING_TIMEOUT=120

# ============================================================================
# 验证配置
# ============================================================================
# 是否验证文件完整性
VERIFY_FILE_INTEGRITY=true

# 是否验证 MIME 类型
VERIFY_MIME_TYPE=true

# 允许的 MIME 类型不匹配容忍度（0-1，1 = 完全容忍）
MIME_MISMATCH_TOLERANCE=0
